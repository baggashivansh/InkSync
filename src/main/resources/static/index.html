<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InkSync Editor</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2/lib/stomp.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            flex-direction:column;
            background:linear-gradient(180deg,#f8fafc,#eef2f7);
            color:#111827;
        }

        #loader{
            position:fixed;
            width:100%;
            height:100%;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:26px;
            font-weight:600;
            letter-spacing:1px;
            z-index:999;
            animation:fadeOut 0.7s ease forwards;
            animation-delay:1.3s;
        }

        @keyframes fadeOut{
            to{
                opacity:0;
                visibility:hidden;
            }
        }

        .container{
            flex:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:40px 20px;
        }

        .header{
            width:100%;
            max-width:1000px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            flex-wrap:wrap;
            gap:10px;
        }

        .title{
            font-size:36px;
            font-weight:700;
        }

        .actions{
            display:flex;
            gap:10px;
        }

        button{
            border:none;
            padding:10px 16px;
            border-radius:8px;
            font-size:14px;
            cursor:pointer;
            transition:all .2s ease;
        }

        .shareBtn{
            background:#6366f1;
            color:white;
        }

        .shareBtn:hover{
            background:#4f46e5;
        }

        .saveBtn{
            background:#e5e7eb;
        }

        .saveBtn:hover{
            background:#d1d5db;
        }

        .editorWrapper{
            width:100%;
            max-width:1000px;
        }

        textarea{
            width:100%;
            height:60vh;
            border-radius:12px;
            border:1px solid #e5e7eb;
            padding:20px;
            font-size:16px;
            line-height:1.6;
            resize:none;
            outline:none;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,0.05);
            transition:box-shadow .25s ease;
        }

        textarea:focus{
            box-shadow:0 15px 35px rgba(0,0,0,0.08);
        }

        footer{
            text-align:center;
            padding:16px;
            font-size:14px;
            color:#6b7280;
        }

        @media(max-width:768px){

            .title{
                font-size:28px;
            }

            textarea{
                height:55vh;
                font-size:15px;
            }

        }

    </style>

</head>

<body>

<div id="loader">InkSync</div>

<div class="container">

    <div class="header">

        <div class="title">InkSync Editor</div>

        <div class="actions">

            <button class="shareBtn" onclick="shareNote()">Share</button>
            <button class="saveBtn" onclick="saveNote()">Save</button>

        </div>

    </div>

    <div class="editorWrapper">

        <textarea id="editor" placeholder="Start typing..."></textarea>

    </div>

</div>

<footer>
    © 2026 Built by Shivansh Bagga
</footer>

<script>

    const editor = document.getElementById("editor")

    let stompClient = null
    let debounceTimer = null

    /* Extract document ID */

    const path = window.location.pathname.split("/")
    const docId = path[2] || "default"

    /* Connect WebSocket */

    function connect(){

        const socket = new SockJS("/ws")

        stompClient = Stomp.over(socket)

        stompClient.connect({}, function(){

            stompClient.subscribe("/topic/notes/" + docId, function(message){

                const data = JSON.parse(message.body)

                editor.value = data.content

            })

        })

    }

    connect()

    /* Load document */

    fetch("/documents/" + docId)
        .then(res => res.text())
        .then(data => {

            editor.value = data

        })

    /* Debounced editing */

    editor.addEventListener("input", function(){

        clearTimeout(debounceTimer)

        debounceTimer = setTimeout(sendEdit,300)

    })

    function sendEdit(){

        const message = {

            docId: docId,
            content: editor.value

        }

        stompClient.send(
            "/app/edit/" + docId,
            {},
            JSON.stringify(message)
        )

    }

    /* Share link */

    function shareNote(){

        const url = window.location.href

        navigator.clipboard.writeText(url)

        alert("Share link copied!")

    }

    /* Save locally */

    function saveNote(){

        const text = editor.value

        const blob = new Blob([text], {type:"text/plain"})

        const a = document.createElement("a")

        a.href = URL.createObjectURL(blob)

        a.download = "note.txt"

        a.click()

    }

</script>

</body>
</html>
